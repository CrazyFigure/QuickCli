name: windows-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/**
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build portable exe
        shell: pwsh
        run: |
          python -m PyInstaller .\QuickCli.spec --noconfirm --clean

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress --yes

      - name: Build setup exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\installer\dist | Out-Null
          New-Item -ItemType Directory -Force .\output | Out-Null
          Copy-Item .\dist\QuickCli.exe .\installer\dist\QuickCli.exe -Force
          Copy-Item .\icon.ico .\installer\icon.ico -Force
          Set-Location .\installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" .\QuickCli.iss
          Set-Location ..
          Copy-Item .\installer\output\QuickCli-Setup.exe .\output\QuickCli-Setup.exe -Force

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickCli-portable-exe
          path: dist/QuickCli.exe
          if-no-files-found: error

      - name: Upload setup exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickCli-setup-exe
          path: output/QuickCli-Setup.exe
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/QuickCli.exe
            output/QuickCli-Setup.exe
